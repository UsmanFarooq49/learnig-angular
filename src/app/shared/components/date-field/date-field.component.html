<div class="date-field" [class.has-error]="hasError" [class]="widthClass">

    <p-floatlabel [variant]="floatVariant">
        <p-datepicker
            [inputId]="fieldId"
            [ngModel]="value()"
            (ngModelChange)="onValueChange($event)"
            (onBlur)="onBlur()"
            [disabled]="disabled"
            [dateFormat]="dateFormat"
            [showIcon]="showIcon"
            [showButtonBar]="showButtonBar"
            [minDate]="minDate"
            [maxDate]="maxDate"
            [placeholder]="placeholder"
            [invalid]="hasError"
            appendTo="body"
            styleClass="w-full"
        />
        <label [for]="fieldId">
            {{ label }}
            @if (required) { <span class="date-field__required" aria-hidden="true">*</span> }
        </label>
    </p-floatlabel>

    <!-- Helper / Error text — only rendered when there is content to show -->
    @if (hasError || hint) {
        <div class="date-field__footer">
            @if (hasError) {
                <small class="date-field__error" role="alert">
                    <i class="pi pi-exclamation-circle" style="font-size: 0.875rem;"></i>
                    <span>{{ firstErrorMessage }}</span>
                </small>
            } @else {
                <small class="date-field__hint">{{ hint }}</small>
            }
        </div>
    }

</div>
