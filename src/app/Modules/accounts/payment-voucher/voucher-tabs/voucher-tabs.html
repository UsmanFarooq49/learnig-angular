<div class="bg-white rounded-xl border border-gray-200 p-5">
    <!-- Tab nav -->
    <div class="border-b border-gray-200">
        <div class="flex items-center gap-6 overflow-x-auto">
            @for (tab of tabs(); track tab.key) {
                <button
                    type="button"
                    (click)="setActive(tab.key)"
                    class="flex items-center gap-2 pb-3 -mb-px text-sm font-medium border-b-2 transition-colors cursor-pointer whitespace-nowrap"
                    [ngClass]="active() === tab.key
                        ? 'border-[var(--primary-color)] text-[var(--primary-color)]'
                        : 'border-transparent text-gray-500 hover:text-gray-700'"
                >
                    {{ tab.label }}
                    @if (tab.count != null) {
                        <span
                            class="px-1.5 py-0.5 rounded-full text-[11px] font-semibold"
                            [ngClass]="active() === tab.key
                                ? 'bg-blue-100 text-[var(--primary-color)]'
                                : 'bg-gray-100 text-gray-500'"
                        >
                            {{ tab.count }}
                        </span>
                    }
                </button>
            }
        </div>
    </div>

    <!-- Active tab content -->
    <div class="pt-5">
        @switch (active()) {
            @case ('attachments') { <app-attachments-tab /> }
            @case ('audit-log') {
                <app-audit-log-tab
                    [voucherId]="voucherId()"
                    [entries]="auditEntries()"
                    [loading]="auditLoading()"
                    [error]="auditError()"
                />
            }
            @case ('approval-workflow') { <app-approval-workflow-tab /> }
            @case ('linked-documents') { <app-linked-documents-tab /> }
        }
    </div>
</div>
